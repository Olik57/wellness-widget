<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Wellness Widget</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f0f0; }
        #widget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #4CAF50;
            color: white;
            padding: 20px;
            border-radius: 15px;
            width: 250px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        #widget h3 { margin: 0 0 10px 0; }
        #tip { font-size: 14px; margin: 10px 0; }
        button {
            background: white;
            color: #4CAF50;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }
    </style>
</head>
<body>
    <h1>Vítej na Wellness stránce! 💚</h1>

    <div id="widget">
        <h3>💧 Wellness Tip</h3>
        <div id="tip">Klikni na tlačítko pro tip!</div>
        <button onclick="getTip()">Nový tip od AI 🤖</button>
    </div>

    <script>
        async function getTip() {
            document.getElementById('tip').innerText = 'Načítám...';
            const res = await fetch('/ai', { method: 'POST' });
            const data = await res.json();
            document.getElementById('tip').innerText = data.tip;
        }

        // Automaticky načti tip po 30 sekundách
        setInterval(getTip, 30000);
    </script>
</body>
</html>
