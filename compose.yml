services:
  app:
    build: .
    ports:
      - "8081:8081"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=https://kurim.ithope.eu/v1
      - DATABASE_URL=postgresql://postgres:heslo123@db:5432/wellness_db
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_PASSWORD=heslo123
      - POSTGRES_DB=wellness_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
