<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Historie Wellness AI</title>
    <style>
        body { background-color: #1e1e2e; color: #cdd6f4; font-family: sans-serif; padding: 40px; }
        h1 { color: #fab387; border-bottom: 2px solid #fab387; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: #181825; }
        th, td { border: 1px solid #313244; padding: 12px; text-align: left; }
        th { background-color: #313244; color: #fab387; }
        tr:hover { background-color: #2a2a3a; }
        .date { color: #89b4fa; font-size: 0.9em; }
    </style>
</head>
<body>
    <h1>📜 Historie konverzací</h1>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Datum</th>
                <th>Tvá zpráva</th>
                <th>Odpověď AI</th>
            </tr>
        </thead>
        <tbody>
            {% for radek in data %}
            <tr>
                <td>{{ radek[0] }}</td>
                <td class="date">{{ radek[3] }}</td>
                <td>{{ radek[1] }}</td>
                <td>{{ radek[2] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <br>
    <a href="/" style="color: #fab387;">← Zpět na chat</a>
</body>
</html>
